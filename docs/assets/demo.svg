<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <defs>
    <style>
      .mono { font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="700" height="200" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="700" height="10" fill="#313244"/>

  <!-- macOS-style window buttons -->
  <circle cx="20" cy="18" r="5.5" fill="#f38ba8"/>
  <circle cx="38" cy="18" r="5.5" fill="#f9e2af"/>
  <circle cx="56" cy="18" r="5.5" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" fill="#a6adc8" font-size="12" class="mono">tqdm-tag demo</text>

  <!-- === plain tqdm (top bar) === -->
  <text x="16" y="68" fill="#6c7086" font-size="12" class="mono">plain tqdm:</text>

  <!-- left label -->
  <text x="16" y="90" fill="#cdd6f4" font-size="13" class="mono">Processing:  65%|</text>

  <!-- filled bar – single colour -->
  <rect x="183" y="76" width="169" height="15" rx="1" fill="#89b4fa"/>
  <!-- empty bar -->
  <rect x="352" y="76" width="91" height="15" rx="1" fill="#313244"/>

  <!-- pipe + stats -->
  <text x="443" y="90" fill="#cdd6f4" font-size="13" class="mono">| 65/100 [00:05&lt;00:02]</text>

  <!-- === tqdm-tag (bottom bar) === -->
  <text x="16" y="130" fill="#6c7086" font-size="12" class="mono">tqdm-tag:</text>

  <!-- left label -->
  <text x="16" y="152" fill="#cdd6f4" font-size="13" class="mono">Processing:  65%|</text>

  <!-- colored filled segments -->
  <!-- green: items 0-24 (37%) -->
  <rect x="183" y="138" width="96"  height="15" rx="1" fill="#a6e3a1"/>
  <!-- yellow: items 25-28 (6%) -->
  <rect x="279" y="138" width="16"  height="15" rx="0" fill="#f9e2af"/>
  <!-- green: items 29-54 (40%) -->
  <rect x="295" y="138" width="42"  height="15" rx="0" fill="#a6e3a1"/>
  <!-- red: items 55-65 (17%) -->
  <rect x="337" y="138" width="15"  height="15" rx="0" fill="#f38ba8"/>
  <!-- empty bar -->
  <rect x="352" y="138" width="91"  height="15" rx="1" fill="#313244"/>

  <!-- pipe + stats -->
  <text x="443" y="152" fill="#cdd6f4" font-size="13" class="mono">| 65/100 [00:05&lt;00:02]</text>

  <!-- Legend -->
  <rect x="16"  y="176" width="10" height="10" rx="2" fill="#a6e3a1"/>
  <text x="30"  y="186" fill="#a6adc8" font-size="11" class="mono">normal</text>

  <rect x="95"  y="176" width="10" height="10" rx="2" fill="#f9e2af"/>
  <text x="109" y="186" fill="#a6adc8" font-size="11" class="mono">warn</text>

  <rect x="158" y="176" width="10" height="10" rx="2" fill="#f38ba8"/>
  <text x="172" y="186" fill="#a6adc8" font-size="11" class="mono">error</text>
</svg>
